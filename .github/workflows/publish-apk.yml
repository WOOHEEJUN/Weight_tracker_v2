name: APK 빌드 및 릴리스

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Java 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Android SDK 설정
        uses: android-actions/setup-android@v3

      - name: 의존성 설치
        run: npm ci

      - name: Expo Android 프로젝트 생성
        run: npx expo prebuild --platform android --no-install

      - name: 고정 debug 서명키 적용
        run: |
          cp signing/debug.keystore android/app/debug.keystore

      - name: APK 빌드
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: APK 파일 준비
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk dist/weight-tracker-v2.apk
          sha256sum dist/weight-tracker-v2.apk > dist/weight-tracker-v2.apk.sha256

      - name: 최신 APK 릴리스 갱신
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag -f latest-apk "$GITHUB_SHA"
          git push origin latest-apk --force

          if gh release view latest-apk >/dev/null 2>&1; then
            gh release upload latest-apk dist/weight-tracker-v2.apk dist/weight-tracker-v2.apk.sha256 --clobber
            gh release edit latest-apk --title "최신 APK" --notes "main 브랜치에서 자동 빌드한 최신 Android APK입니다."
          else
            gh release create latest-apk dist/weight-tracker-v2.apk dist/weight-tracker-v2.apk.sha256 --title "최신 APK" --notes "main 브랜치에서 자동 빌드한 최신 Android APK입니다."
          fi

name: APK 다운로드 페이지 배포

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Java 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Android SDK 설정
        uses: android-actions/setup-android@v3

      - name: 의존성 설치
        run: npm ci

      - name: Expo Android 프로젝트 생성
        run: npx expo prebuild --platform android --no-install

      - name: APK 빌드
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Pages 파일 준비
        run: |
          mkdir -p site/assets
          cp pages/index.html site/index.html
          cp assets/icon.png site/assets/icon.png
          cp android/app/build/outputs/apk/debug/app-debug.apk site/weight-tracker-v2.apk
          sha256sum site/weight-tracker-v2.apk > site/weight-tracker-v2.apk.sha256
          touch site/.nojekyll

      - name: Pages 설정
        uses: actions/configure-pages@v5

      - name: Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
